[bot]
timezone = "America/New_York"
database_path = "briefing.sqlite3"

[discord]
webhook_url_env = "DISCORD_WEBHOOK_URL"
# Render briefings as rich embeds (hyperlinked titles + summary cards, colored
# per section) instead of plain text with a trailing links block. Applies to
# both webhook sends and the interactive bot.
use_embeds = false

[discord.interactive]
enabled = false
token_env = "DISCORD_BOT_TOKEN"
allowed_guild_ids = [123456789]
allowed_channel_ids = [987654321]
allowed_user_ids = []
mention_chat_enabled = false
mention_chat_max_tokens = 500
mention_chat_temperature = 0.7
conversation_memory_enabled = false
conversation_memory_max_messages = 8
conversation_memory_max_tokens = 1000
conversation_memory_max_age_minutes = 60
remembered_facts_enabled = false
remembered_facts_max_items = 20
retrieval_context_enabled = false
retrieval_context_limit = 3

[llm]
enabled = true
base_url = "http://localhost:11434/v1"
model = "llama3.1:8b"
temperature = 0.2
timeout_seconds = 600
max_tokens = 700
persona_path = "personas/default.md"

[profiles.daily]
sections = ["weather", "calendar", "news"]

[profiles.tech]
sections = ["weather", "calendar", "tech"]

[sections.weather]
type = "weather"
enabled = true
provider = "open-meteo"
latitude = 40.7128
longitude = -74.0060
units = "imperial"

[sections.calendar]
type = "calendar"
enabled = true
source = "json"
json_path = "calendar.json"
lookahead_hours = 24

[sections.news]
type = "rss"
enabled = true
use_llm = true
max_items = 8
since_hours = 24
# When true (and use_llm is on), fetch each item's article and summarize the
# full readable text instead of the short RSS blurb. Adds one HTTP fetch per
# newly-summarized item; failures fall back to the blurb.
extract_full_article = false
feeds = ["npr", "bbc"]

[sections.tech]
type = "rss"
enabled = true
use_llm = true
max_items = 8
since_hours = 24
feeds = ["ars", "lobsters"]

[feeds.npr]
name = "NPR News"
url = "https://feeds.npr.org/1001/rss.xml"
priority = 8

[feeds.bbc]
name = "BBC News"
url = "https://feeds.bbci.co.uk/news/rss.xml"
priority = 9

[feeds.ars]
name = "Ars Technica"
url = "https://feeds.arstechnica.com/arstechnica/index"
priority = 8

[feeds.lobsters]
name = "Lobsters"
url = "https://lobste.rs/rss"
priority = 6
